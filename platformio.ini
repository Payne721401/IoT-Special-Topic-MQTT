; PlatformIO project configuration.
;
; - env:native        host unit tests for lib/protocol (no hardware needed)
; - env:sensor-node   ESP32 firmware for the CO2 / temp-humidity node
; - env:fan-controller ESP32 firmware for the dual-motor fan node
;
; Run the tests:        pio test -e native
; Build the firmware:   pio run -e sensor-node   (needs firmware/sensor-node/secrets.h)

[platformio]
src_dir = firmware

; ---- Host unit tests (CI runs this; no board required) ----
[env:native]
platform = native
test_framework = unity
build_src_filter = -<*>          ; tests compile only lib/ + test/
build_flags = -std=gnu++17

; ---- Firmware: sensor node ----
[env:sensor-node]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<sensor-node/>
lib_deps =
    knolleary/PubSubClient@^2.8
    artronshop/ArtronShop_SHT3x

; ---- Firmware: fan controller ----
[env:fan-controller]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<fan-controller/>
lib_deps =
    knolleary/PubSubClient@^2.8
    erropix/ESP32 AnalogWrite
